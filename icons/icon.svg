<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#E87A2A"/>

  <!-- Dumbbell (upper half, padded inward) -->
  <g fill="#FFFFFF">
    <!-- Left outer plate -->
    <rect x="80" y="118" width="48" height="96" rx="11"/>
    <!-- Left inner collar -->
    <rect x="128" y="134" width="26" height="64" rx="6"/>
    <!-- Bar -->
    <rect x="154" y="150" width="204" height="30" rx="6"/>
    <!-- Right inner collar -->
    <rect x="358" y="134" width="26" height="64" rx="6"/>
    <!-- Right outer plate -->
    <rect x="384" y="118" width="48" height="96" rx="11"/>
  </g>

  <!-- Bar chart (lower half, padded inward) -->
  <g fill="#FFFFFF">
    <!-- Baseline -->
    <rect x="80" y="378" width="352" height="12" rx="6"/>
    <!-- Bar 1 -->
    <rect x="104" y="318" width="52" height="60" rx="7"/>
    <!-- Bar 2 -->
    <rect x="184" y="282" width="52" height="96" rx="7"/>
    <!-- Bar 3 -->
    <rect x="264" y="252" width="52" height="126" rx="7"/>
    <!-- Bar 4 -->
    <rect x="344" y="218" width="52" height="160" rx="7"/>
  </g>
</svg>
