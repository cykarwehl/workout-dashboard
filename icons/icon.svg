<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#4A6FA5"/>
  <!-- Dumbbell icon -->
  <g fill="#FFFFFF">
    <!-- Left plate outer -->
    <rect x="60" y="220" width="48" height="72" rx="10"/>
    <!-- Left plate inner -->
    <rect x="108" y="232" width="28" height="48" rx="6"/>
    <!-- Bar -->
    <rect x="136" y="244" width="240" height="24" rx="6"/>
    <!-- Right plate inner -->
    <rect x="376" y="232" width="28" height="48" rx="6"/>
    <!-- Right plate outer -->
    <rect x="404" y="220" width="48" height="72" rx="10"/>
  </g>
  <!-- Small upward trend line at bottom -->
  <polyline points="160,380 220,340 280,355 340,310 380,295" stroke="#DBE6F5" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
