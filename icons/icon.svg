<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#E87A2A"/>

  <!-- Dumbbell (upper half) -->
  <g fill="#FFFFFF">
    <!-- Left outer plate -->
    <rect x="44" y="100" width="56" height="110" rx="12"/>
    <!-- Left inner collar -->
    <rect x="100" y="118" width="30" height="74" rx="7"/>
    <!-- Bar -->
    <rect x="130" y="138" width="252" height="34" rx="7"/>
    <!-- Right inner collar -->
    <rect x="382" y="118" width="30" height="74" rx="7"/>
    <!-- Right outer plate -->
    <rect x="412" y="100" width="56" height="110" rx="12"/>
  </g>

  <!-- Bar chart (lower half) -->
  <g fill="#FFFFFF">
    <!-- Baseline -->
    <rect x="60" y="390" width="392" height="14" rx="7"/>
    <!-- Bar 1 (short) -->
    <rect x="88" y="322" width="58" height="68" rx="8"/>
    <!-- Bar 2 (medium) -->
    <rect x="178" y="280" width="58" height="110" rx="8"/>
    <!-- Bar 3 (tall) -->
    <rect x="268" y="248" width="58" height="142" rx="8"/>
    <!-- Bar 4 (tallest) -->
    <rect x="358" y="210" width="58" height="180" rx="8"/>
  </g>
</svg>
