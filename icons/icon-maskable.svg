<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#E87A2A"/>

  <!-- Dumbbell (upper half, inset for safe zone) -->
  <g fill="#FFFFFF">
    <!-- Left outer plate -->
    <rect x="56" y="108" width="52" height="100" rx="11"/>
    <!-- Left inner collar -->
    <rect x="108" y="124" width="28" height="68" rx="6"/>
    <!-- Bar -->
    <rect x="136" y="142" width="240" height="30" rx="6"/>
    <!-- Right inner collar -->
    <rect x="376" y="124" width="28" height="68" rx="6"/>
    <!-- Right outer plate -->
    <rect x="404" y="108" width="52" height="100" rx="11"/>
  </g>

  <!-- Bar chart (lower half, inset for safe zone) -->
  <g fill="#FFFFFF">
    <!-- Baseline -->
    <rect x="68" y="390" width="376" height="13" rx="6"/>
    <!-- Bar 1 -->
    <rect x="92" y="328" width="54" height="62" rx="7"/>
    <!-- Bar 2 -->
    <rect x="180" y="288" width="54" height="102" rx="7"/>
    <!-- Bar 3 -->
    <rect x="268" y="255" width="54" height="135" rx="7"/>
    <!-- Bar 4 -->
    <rect x="356" y="218" width="54" height="172" rx="7"/>
  </g>
</svg>
