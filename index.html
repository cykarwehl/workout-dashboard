<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Workout Dashboard">
<title>My Workout Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <h1>My Workout Dashboard</h1>
  <p id="last-sync">Loading data...</p>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Fetching your workouts...</span>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="showPage('overview')">
    <span class="nav-icon">⚡</span>
    <span>Overview</span>
  </div>
  <div class="nav-item" onclick="showPage('progress')">
    <span class="nav-icon">📈</span>
    <span>Progress</span>
  </div>
  <div class="nav-item" onclick="showPage('prs')">
    <span class="nav-icon">🏆</span>
    <span>PRs</span>
  </div>
  <div class="nav-item" onclick="showPage('history')">
    <span class="nav-icon">📋</span>
    <span>History</span>
  </div>
</nav>

<script src="templates.js"></script>
<script src="app.js"></script>
</body>
</html>
